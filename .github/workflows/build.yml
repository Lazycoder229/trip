name: Build Trip

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ─── Windows: build exe → wrap in NSIS installer ──────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pkg
        run: npm install -g pkg

      # --icon embeds trip-icon.ico into the exe itself
      - name: Build trip.exe (with icon)
        run: pkg trip.js --targets node18-win-x64 --output trip.exe --icon trip-icon.ico

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build TripSetup.exe installer
        run: makensis installer.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: trip-windows-installer
          path: TripSetup.exe

  # ─── Linux: build standalone binary ───────────────────────────────────────
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pkg
        run: npm install -g pkg

      - name: Build trip-linux
        run: pkg trip.js --targets node18-linux-x64 --output trip-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trip-linux
          path: trip-linux

  # ─── Release: attach both to GitHub release ───────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: trip-windows-installer

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: trip-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TripSetup.exe
            trip-linux
          generate_release_notes: true