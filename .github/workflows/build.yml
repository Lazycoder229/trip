name: Build Trip Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pkg and rcedit
        run: |
          npm install -g pkg
          npm install -g rcedit

      - name: Build trip.exe
        run: pkg trip.js --targets node18-win-x64 --output trip.exe

      - name: Inject custom icon
        run: rcedit "trip.exe" --set-icon "trip-icon.ico"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trip-windows
          path: trip.exe

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pkg
        run: npm install -g pkg

      - name: Build trip-linux
        run: pkg trip.js --targets node18-linux-x64 --output trip-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trip-linux
          path: trip-linux

  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: trip-windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: trip-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            trip.exe
            trip-linux
          generate_release_notes: true
